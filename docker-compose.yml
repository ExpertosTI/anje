# ANJEYLEADERS — NestJS API + React Web (Renace)

services:
  api:
    image: anje-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      PORT: "3001"
      ADMIN_PIN: ${ADMIN_PIN:-ANJE2026}
      DB_HOST: ${DB_HOST:-insforge_postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-insforge}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    networks:
      RenaceNet:
        aliases:
          - api
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  web:
    image: anje-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    networks:
      - RenaceNet
    depends_on:
      - api
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.anje-http.rule=Host(`anje.renace.tech`)
        - traefik.http.routers.anje-http.entrypoints=web
        - traefik.http.routers.anje-http.middlewares=anje-redirect-https
        - traefik.http.routers.anje.rule=Host(`anje.renace.tech`)
        - traefik.http.routers.anje.entrypoints=websecure
        - traefik.http.routers.anje.tls=true
        - traefik.http.routers.anje.tls.certresolver=letsencryptresolver
        - traefik.http.routers.anje.service=anje-svc
        - traefik.http.routers.anje.middlewares=anje-security
        - traefik.http.services.anje-svc.loadbalancer.server.port=80
        - traefik.http.services.anje-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.anje-svc.loadbalancer.healthcheck.interval=30s
        - traefik.http.middlewares.anje-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.anje-redirect-https.redirectscheme.permanent=true
        - traefik.http.middlewares.anje-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.anje-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.anje-security.headers.browserXssFilter=true

networks:
  RenaceNet:
    external: true
