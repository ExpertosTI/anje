name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 45.9.191.18
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/anje 2>/dev/null || git clone https://github.com/ExpertosTI/anje.git /opt/anje
            cd /opt/anje
            git fetch origin main
            git reset --hard origin/main
            ./deploy.sh
